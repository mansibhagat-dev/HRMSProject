<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'HRMS - ' + ${pageTitle}">HRMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="app-body">

<div th:replace="~{navbar :: navbar}"></div>

<div class="container-fluid py-4 px-4">
    <div class="page-header mb-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/departments}">Departments</a></li>
                <li class="breadcrumb-item active" th:text="${pageTitle}"></li>
            </ol>
        </nav>
        <h3 class="fw-bold mb-0">
            <i class="bi bi-diagram-3-fill me-2 text-success"></i>
            <span th:text="${pageTitle}"></span>
        </h3>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <!-- Add form -->
                    <form th:if="${department.id == null}"
                          th:action="@{/departments/add}" th:object="${department}" method="post" novalidate>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Department Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{name}"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''"
                                   placeholder="e.g. Human Resources">
                            <div th:if="${#fields.hasErrors('name')}" class="invalid-feedback" th:errors="*{name}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Description</label>
                            <textarea class="form-control" th:field="*{description}" rows="3"
                                      placeholder="Brief description of this department..."></textarea>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Location</label>
                            <input type="text" class="form-control" th:field="*{location}"
                                   placeholder="e.g. Floor 2, Building A">
                        </div>
                        <div class="d-flex gap-2 justify-content-end">
                            <a th:href="@{/departments}" class="btn btn-outline-secondary px-4">Cancel</a>
                            <button type="submit" class="btn btn-success px-4">
                                <i class="bi bi-check-circle-fill me-1"></i>Save Department
                            </button>
                        </div>
                    </form>

                    <!-- Edit form -->
                    <form th:if="${department.id != null}"
                          th:action="@{/departments/edit/{id}(id=${department.id})}" th:object="${department}" method="post" novalidate>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Department Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{name}"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''">
                            <div th:if="${#fields.hasErrors('name')}" class="invalid-feedback" th:errors="*{name}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Description</label>
                            <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Location</label>
                            <input type="text" class="form-control" th:field="*{location}">
                        </div>
                        <div class="d-flex gap-2 justify-content-end">
                            <a th:href="@{/departments}" class="btn btn-outline-secondary px-4">Cancel</a>
                            <button type="submit" class="btn btn-warning px-4">
                                <i class="bi bi-check-circle-fill me-1"></i>Update Department
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
