<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRMS - Register</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="login-body">

<div class="login-wrapper">
    <div class="login-card card shadow-lg">

        <!-- Header -->
        <div class="login-header text-center">
            <div class="login-logo mb-3">
                <i class="bi bi-person-plus-fill"></i>
            </div>
            <h2 class="fw-bold mb-0">Create Account</h2>
            <p class="text-muted mt-1">Join HRMS Portal</p>
        </div>

        <div class="card-body p-4">

            <!-- Error Alert -->
            <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span th:text="${errorMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Register Form -->
            <form th:action="@{/register}" th:object="${user}" method="post">

                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        <i class="bi bi-person-fill me-1"></i>Username
                    </label>
                    <input type="text" th:field="*{username}"
                           class="form-control form-control-lg"
                           placeholder="Enter username" required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">
                        <i class="bi bi-lock-fill me-1"></i>Password
                    </label>
                    <div class="input-group">
                        <input type="password" th:field="*{password}"
                               id="password"
                               class="form-control form-control-lg"
                               placeholder="Enter password" required>
                        <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                            <i class="bi bi-eye-fill"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100 login-btn">
                    <i class="bi bi-person-check-fill me-2"></i>Register
                </button>
            </form>

            <!-- Login Redirect -->
            <div class="text-center mt-3">
                <small>
                    Already have an account?
                    <a href="/login" class="fw-semibold">Login here</a>
                </small>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
