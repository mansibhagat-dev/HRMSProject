<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRMS - Add Employee</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="app-body">

<div th:replace="~{navbar :: navbar}"></div>

<div class="container-fluid py-4 px-4">
    <div class="page-header mb-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/employees}">Employees</a></li>
                <li class="breadcrumb-item active" th:text="${pageTitle}"></li>
            </ol>
        </nav>
        <h3 class="fw-bold mb-0"><i class="bi bi-person-plus-fill me-2 text-primary"></i>Add New Employee</h3>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-9">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form th:action="@{/employees/add}" th:object="${employee}" method="post" novalidate>

                        <div class="row g-3">
                            <!-- Full Name -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Full Name <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{name}"
                                       th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''"
                                       placeholder="e.g. John Doe">
                                <div th:if="${#fields.hasErrors('name')}" class="invalid-feedback" th:errors="*{name}"></div>
                            </div>

                            <!-- Email -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Email Address <span class="text-danger">*</span></label>
                                <input type="email" class="form-control" th:field="*{email}"
                                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                                       placeholder="e.g. john@company.com">
                                <div th:if="${#fields.hasErrors('email')}" class="invalid-feedback" th:errors="*{email}"></div>
                            </div>

                            <!-- Phone -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Phone Number <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{phone}"
                                       th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid' : ''"
                                       placeholder="10-digit phone number">
                                <div th:if="${#fields.hasErrors('phone')}" class="invalid-feedback" th:errors="*{phone}"></div>
                            </div>

                            <!-- Department -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Department <span class="text-danger">*</span></label>
                                <select class="form-select" th:field="*{department}"
                                        th:classappend="${#fields.hasErrors('department')} ? 'is-invalid' : ''">
                                    <option value="">-- Select Department --</option>
                                    <option th:each="dept : ${departments}"
                                            th:value="${dept.id}"
                                            th:text="${dept.name}"></option>
                                </select>
                                <div th:if="${#fields.hasErrors('department')}" class="invalid-feedback" th:errors="*{department}"></div>
                            </div>

                            <!-- Designation -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Designation <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{designation}"
                                       th:classappend="${#fields.hasErrors('designation')} ? 'is-invalid' : ''"
                                       placeholder="e.g. Software Engineer">
                                <div th:if="${#fields.hasErrors('designation')}" class="invalid-feedback" th:errors="*{designation}"></div>
                            </div>

                            <!-- Salary -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Salary (₹) <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" th:field="*{salary}"
                                       th:classappend="${#fields.hasErrors('salary')} ? 'is-invalid' : ''"
                                       placeholder="e.g. 50000" min="0" step="0.01">
                                <div th:if="${#fields.hasErrors('salary')}" class="invalid-feedback" th:errors="*{salary}"></div>
                            </div>

                            <!-- Joining Date -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Joining Date <span class="text-danger">*</span></label>
                                <input type="date" class="form-control" th:field="*{joiningDate}"
                                       th:classappend="${#fields.hasErrors('joiningDate')} ? 'is-invalid' : ''">
                                <div th:if="${#fields.hasErrors('joiningDate')}" class="invalid-feedback" th:errors="*{joiningDate}"></div>
                            </div>

                            <!-- Status -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Status</label>
                                <select class="form-select" th:field="*{status}">
                                    <option value="ACTIVE">Active</option>
                                    <option value="INACTIVE">Inactive</option>
                                </select>
                            </div>
                        </div>

                        <hr class="my-4">
                        <div class="d-flex gap-2 justify-content-end">
                            <a th:href="@{/employees}" class="btn btn-outline-secondary px-4">
                                <i class="bi bi-x-circle me-1"></i>Cancel
                            </a>
                            <button type="submit" class="btn btn-primary px-4">
                                <i class="bi bi-check-circle-fill me-1"></i>Save Employee
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
