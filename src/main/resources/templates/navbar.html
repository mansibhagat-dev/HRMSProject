<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark" id="mainNavbar">
    <div class="container-fluid">
        <!-- Brand -->
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">
            <i class="bi bi-building-fill-gear me-2"></i>HRMS
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/dashboard}"
                       th:classappend="${#httpServletRequest != null and #httpServletRequest.requestURI == '/dashboard'} ? 'active' : ''">
                        <i class="bi bi-speedometer2 me-1"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/employees}"
                       th:classappend="${#httpServletRequest != null and #strings.startsWith(#httpServletRequest.requestURI,'/employees')} ? 'active' : ''">
                        <i class="bi bi-people-fill me-1"></i>Employees
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/departments}"
                       th:classappend="${#httpServletRequest != null and #strings.startsWith(#httpServletRequest.requestURI,'/departments')} ? 'active' : ''">
                        <i class="bi bi-diagram-3-fill me-1"></i>Departments
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/leaves}"
                       th:classappend="${#httpServletRequest != null and #strings.startsWith(#httpServletRequest.requestURI,'/leaves')} ? 'active' : ''">
                        <i class="bi bi-calendar-check-fill me-1"></i>Leave Requests
                    </a>
                </li>
            </ul>
            <!-- User Info & Logout -->
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item me-2">
                    <span class="navbar-text text-light">
                        <i class="bi bi-person-circle me-1"></i>
                        <sec:authentication property="name" />
                    </span>
                </li>
                <li class="nav-item">
                    <a class="btn btn-outline-light btn-sm" th:href="@{/logout}">
                        <i class="bi bi-box-arrow-right me-1"></i>Logout
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
