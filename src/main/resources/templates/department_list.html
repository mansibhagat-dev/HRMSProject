<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRMS - Departments</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="app-body">

<div th:replace="~{navbar :: navbar}"></div>

<div class="container-fluid py-4 px-4">

    <div class="page-header mb-4 d-flex justify-content-between align-items-center flex-wrap gap-2">
        <div>
            <h3 class="fw-bold mb-0"><i class="bi bi-diagram-3-fill me-2 text-success"></i>Department Management</h3>
            <p class="text-muted mb-0">Organize your company departments.</p>
        </div>
        <a th:href="@{/departments/add}" class="btn btn-success">
            <i class="bi bi-plus-circle-fill me-2"></i>Add Department
        </a>
    </div>

    <!-- Alerts -->
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Department Cards Grid -->
    <div th:if="${departments.isEmpty()}" class="text-center py-5 text-muted">
        <i class="bi bi-diagram-3 fs-1"></i>
        <p class="mt-2 fs-5">No departments found.</p>
        <a th:href="@{/departments/add}" class="btn btn-success">Add First Department</a>
    </div>

    <div th:if="${!departments.isEmpty()}" class="row g-4 mb-4">
        <div th:each="dept : ${departments}" class="col-xl-3 col-md-4 col-sm-6">
            <div class="card border-0 shadow-sm dept-card h-100">
                <div class="card-body">
                    <div class="dept-icon mb-3">
                        <i class="bi bi-building fs-2 text-success"></i>
                    </div>
                    <h5 class="fw-bold mb-1" th:text="${dept.name}"></h5>
                    <p class="text-muted small mb-2" th:text="${dept.description ?: 'No description'}"></p>
                    <div class="d-flex align-items-center text-muted small mb-3">
                        <i class="bi bi-geo-alt-fill me-1 text-danger"></i>
                        <span th:text="${dept.location ?: 'N/A'}"></span>
                    </div>
                    <div class="d-flex align-items-center text-muted small">
                        <i class="bi bi-people-fill me-1 text-primary"></i>
                        <span>
                            <span th:text="${dept.employees != null ? dept.employees.size() : 0}"></span> Employee(s)
                        </span>
                    </div>
                </div>
                <div class="card-footer bg-transparent border-0 d-flex gap-2">
                    <a th:href="@{/departments/edit/{id}(id=${dept.id})}"
                       class="btn btn-sm btn-outline-warning flex-fill">
                        <i class="bi bi-pencil-fill me-1"></i>Edit
                    </a>
                    <button type="button" class="btn btn-sm btn-outline-danger flex-fill"
                            th:data-id="${dept.id}"
                            th:data-name="${dept.name}"
                            onclick="confirmDelete(this.dataset.id, this.dataset.name, 'department')">
                        <i class="bi bi-trash-fill me-1"></i>Delete
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Delete Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold text-danger"><i class="bi bi-trash-fill me-2"></i>Confirm Delete</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                Are you sure you want to delete department <strong id="deleteItemName"></strong>?
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <a id="deleteConfirmBtn" href="#" class="btn btn-danger">
                    <i class="bi bi-trash-fill me-1"></i>Delete
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
